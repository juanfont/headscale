name: integration

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# Each test is a NixOS-VM flake check (full tailscale version matrix, sqlite
# plus a postgres variant) — one job per check, derived from the checks the
# flake exposes. The fileset-filtered, content-addressed checks hit the hestia
# cache when their inputs are unchanged. A prime job builds the shared images +
# test binary once so the matrix substitutes them instead of each rebuilding.
jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main
      - uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main
      - id: list
        run: |
          checks=$(nix eval --json .#checks.x86_64-linux --apply builtins.attrNames \
            | jq -c '[.[] | select(startswith("integration-"))]')
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  prime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main
      - uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main
      - run: nix build -L --fallback .#packages.x86_64-linux.integration-deps

  integration:
    needs: [list, prime]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(needs.list.outputs.checks) }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main
      - uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main
      - name: ${{ matrix.check }}
        run: nix build -L --fallback .#checks.x86_64-linux.${{ matrix.check }}
